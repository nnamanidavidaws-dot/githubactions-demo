name: CI/CD Pipeline demo

on:
  pull_request:
    branches:
      - main

jobs: 
  test:
    runs-on: ubuntu-latest
    container:
      image: node:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          node-version: 24
      - run: npm ci
      - run: npm test
      - run : npm run build